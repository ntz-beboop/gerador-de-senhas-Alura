<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="cadeado-icon">🔒</div>
            <h1>Gerador de senhas</h1>
            <p>Gere instantaneamente uma senha aleatória e segura</p>
        </header>

        <main>
            <div class="senha-container">
                <span>Senha</span>
                <strong id="senha-gerada">BCOSXUWIOESD</strong>
            </div>

            <section class="configuracoes">
                <h2>Personalize sua senha</h2>
                
                <div class="grid-config">
                    <div class="coluna">
                        <h3>Número de caracteres</h3>
                        <div class="seletor-tamanho">
                            <button id="btn-menos">-</button>
                            <span id="tamanho-txt">12</span>
                            <button id="btn-mais">+</button>
                        </div>
                    </div>

                    <div class="coluna">
                        <h3>Características da senha</h3>
                        <label>
                            <input type="checkbox" id="chk-maiusculas" checked> Letras maiúsculas
                        </label>
                        <label>
                            <input type="checkbox" id="chk-minusculas"> Letras minúsculas
                        </label>
                        <label>
                            <input type="checkbox" id="chk-numeros"> Números
                        </label>
                        <label>
                            <input type="checkbox" id="chk-simbolos"> Símbolos
                        </label>
                    </div>

                    <div class="coluna">
                        <h3>Força da senha</h3>
                        <div class="barra-forca-container">
                            <div id="barra-forca" class="media"></div>
                        </div>
                        <div class="labels-forca">
                            <span>Fraca</span>
                            <span>Média</span>
                            <span>Forte</span>
                        </div>
                        <p class="tempo-crack" id="tempo-txt">Um computador pode levar até 11045 dias para descobrir essa senha.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
